services:
  - type: web
    name: category-management-ai
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run category_management_ai/app/dashboard.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13