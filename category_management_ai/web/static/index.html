<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management AI - Data Upload</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #f3f4f6; }
        .gradient-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState("upload"); // 'upload' or 'dashboard'
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [consumptionDays, setConsumptionDays] = useState(30);
            const [isUploading, setIsUploading] = useState(false);
            const [message, setMessage] = useState("");
            const [error, setError] = useState("");
            
            // Dashboard Data
            const [dashboardData, setDashboardData] = useState(null);

            const fetchDashboard = async () => {
                try {
                    const response = await fetch("/api/dashboard");
                    const data = await response.json();
                    if (data.error) {
                        setError(data.error);
                    } else {
                        setDashboardData(data);
                        setView("dashboard");
                    }
                } catch (err) {
                    setError("Failed to fetch dashboard data.");
                }
            };
            
            // Check if dashboard data already exists on page load
            useEffect(() => {
                fetchDashboard();
            }, []);

            const handleFileChange = (e) => {
                setSelectedFiles([...e.target.files]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (selectedFiles.length === 0) {
                    setError("Please select at least one file to upload.");
                    return;
                }

                setIsUploading(true);
                setMessage("");
                setError("");

                const formData = new FormData();
                formData.append("consumption_days", consumptionDays);
                
                selectedFiles.forEach(file => {
                    formData.append("files", file);
                });

                try {
                    const response = await fetch("/upload", {
                        method: "POST",
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        setMessage(data.message + " Please wait while we process... the dashboard will appear when ready!");
                        setSelectedFiles([]); // clear
                        
                        // Begin smart polling: The AI pipeline takes time to run on massive data.
                        // We will try to fetch the dashboard every 10 seconds instead of just once!
                        const pollDashboard = setInterval(async () => {
                            try {
                                const dashRes = await fetch("/api/dashboard");
                                const dashData = await dashRes.json();
                                if (!dashData.error) {
                                    clearInterval(pollDashboard);
                                    setDashboardData(dashData);
                                    setView("dashboard");
                                }
                            } catch (e) {
                                // Keep waiting
                            }
                        }, 10000);
                        
                    } else {
                        throw new Error(data.message || "Upload failed");
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsUploading(false);
                }
            };
            
            if (view === "dashboard" && dashboardData) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col p-8 font-sans text-gray-800">
                        <div className="w-full max-w-7xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-extrabold text-gray-900 tracking-tight">AI Category Dashboard</h2>
                                <button 
                                    onClick={() => setView("upload")} 
                                    className="bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-indigo-700 transition"
                                >
                                    + Upload New Dataset
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                                    <h3 className="text-gray-500 font-bold uppercase tracking-wider mb-2">Total Stores Analyzed</h3>
                                    <p className="text-5xl font-black text-indigo-600">{dashboardData.kpis.total_stores}</p>
                                </div>
                                 <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center">
                                    <h3 className="text-gray-500 font-bold uppercase tracking-wider mb-2">Total SKUs Managed</h3>
                                    <p className="text-5xl font-black text-blue-600">{dashboardData.kpis.total_skus}</p>
                                </div>
                                 <div className="bg-white p-6 rounded-2xl shadow-sm border-gray-100 border-2 border-red-100 flex flex-col items-center justify-center">
                                    <h3 className="text-red-500 font-bold uppercase tracking-wider mb-2">Items to Reorder</h3>
                                    <p className="text-5xl font-black text-red-600">{dashboardData.kpis.reorder_count}</p>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100 bg-gray-50">
                                    <h3 className="font-bold text-gray-800">Next Best Action Master Table (Top 500)</h3>
                                </div>
                                <div className="overflow-x-auto max-h-[600px]">
                                    <table className="min-w-full divide-y divide-gray-200">
                                        <thead className="bg-gray-50 sticky top-0">
                                            <tr>
                                                {dashboardData.columns.map(c => <th key={c} className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">{c}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-gray-200">
                                            {dashboardData.rows.map((row, i) => (
                                                <tr key={i} className="hover:bg-gray-50 transition">
                                                    {dashboardData.columns.map(c => <td key={c} className="px-6 py-4 whitespace-nowrap text-sm text-gray-900 border-r border-gray-50 last:border-0">{row[c]}</td>)}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center p-8 font-sans text-gray-800">
                    <div className="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden mt-10">
                        {/* Header */}
                        <div className="gradient-bg px-8 py-10 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight">AI Data Management Portal</h1>
                                <p className="mt-2 text-indigo-100 text-lg">Upload new files to trigger the AI analysis system.</p>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-16 w-16 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                            </svg>
                        </div>

                        {/* Form area */}
                        <div className="p-8">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                
                                {/* Requirement Notification */}
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded">
                                    <h3 className="text-blue-800 font-bold mb-1">Required Files</h3>
                                    <p className="text-sm text-blue-700 font-medium">Please ensure you upload: <span className="font-bold">Consumption.csv, Consumption_1.csv, Stores.xlsx, Final IMF.xlsx, Onhand.xlsx</span> (You can select multiple at once).</p>
                                </div>

                                {/* Consumption Days */}
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">
                                        Consumption Days (Data Timeframe)
                                    </label>
                                    <div className="flex items-center">
                                        <input 
                                            type="number" 
                                            value={consumptionDays}
                                            onChange={(e) => setConsumptionDays(e.target.value)}
                                            min="1"
                                            className="w-1/3 px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
                                        />
                                        <span className="ml-3 text-gray-500 text-sm">Days covered by your CSVs to determine velocity models.</span>
                                    </div>
                                </div>

                                {/* File Upload */}
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">
                                        Select Files
                                    </label>
                                    <div className="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-dashed border-indigo-300 rounded-xl hover:bg-indigo-50 transition dropzone">
                                        <div className="space-y-2 flex flex-col items-center">
                                            <svg className="mx-auto h-12 w-12 text-indigo-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                            </svg>
                                            <div className="flex text-sm text-gray-600">
                                                <label htmlFor="file-upload" className="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none py-1 px-2 border border-gray-200">
                                                    <span>Upload a file</span>
                                                    <input id="file-upload" name="file-upload" type="file" className="sr-only" multiple onChange={handleFileChange} />
                                                </label>
                                                <p className="pl-2 flex items-center">or drag and drop</p>
                                            </div>
                                            <p className="text-xs text-gray-500">
                                                CSVs, Excel files up to 500MB
                                            </p>
                                        </div>
                                    </div>
                                    {/* Display selected files */}
                                    {selectedFiles.length > 0 && (
                                        <div className="mt-4 bg-gray-50 rounded p-4">
                                            <h4 className="text-sm font-semibold mb-2">Files staged for upload:</h4>
                                            <ul className="text-sm text-gray-600 space-y-1">
                                                {selectedFiles.map((f, i) => (
                                                    <li key={i} className="flex items-center text-indigo-700 font-medium">
                                                        <span className="mr-2">â€¢</span> {f.name} ({(f.size/1024/1024).toFixed(2)} MB)
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>

                                {/* Status Messages */}
                                {error && (
                                    <div className="bg-red-50 text-red-700 p-4 rounded-lg text-sm border border-red-200 font-semibold shadow-sm">
                                        {error}
                                    </div>
                                )}
                                
                                {message && (
                                    <div className="bg-green-50 text-green-700 p-4 rounded-lg text-sm border border-green-200 font-semibold shadow-sm flex items-center">
                                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                        {message}
                                    </div>
                                )}

                                {/* Submit Button */}
                                <button 
                                    type="submit" 
                                    disabled={isUploading}
                                    className={`w-full py-4 text-white font-bold rounded-lg shadow-lg flex justify-center items-center text-lg ${
                                        isUploading 
                                            ? 'bg-gray-400 cursor-not-allowed' 
                                            : 'gradient-bg hover:shadow-xl transform hover:-translate-y-1 transition'
                                    }`}
                                >
                                    {isUploading ? (
                                        <>
                                            <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                            Processing & Running AI...
                                        </>
                                    ) : 'Upload Data & Run AI Pipeline'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
